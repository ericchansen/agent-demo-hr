<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contoso HR Assistant — demo</title>
<style>
  :root { --bg:#1b1a19; --panel:#252423; --bubble:#292827; --me:#0f6cbd;
          --line:#3b3a39; --txt:#f3f2f1; --muted:#a19f9d; --agg:#4a9eda; --det:#b17ad6; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg);
         color:var(--txt); height:100vh; display:flex; flex-direction:column; }
  header { background:var(--panel); border-bottom:1px solid var(--line); padding:12px 18px;
           display:flex; align-items:center; gap:14px; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .sub { color:var(--muted); font-size:12px; }
  header .persona { margin-left:auto; display:flex; align-items:center; gap:8px; font-size:13px; }
  select { background:var(--bubble); color:var(--txt); border:1px solid var(--line);
           border-radius:6px; padding:6px 8px; font-size:13px; }
  #log { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:820px; padding:10px 14px; border-radius:10px; line-height:1.45; }
  .user { align-self:flex-end; background:var(--me); }
  .bot { align-self:flex-start; background:var(--bubble); border:1px solid var(--line); }
  .badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:10px;
           margin-bottom:6px; font-weight:600; }
  .badge.aggregate { background:#12324a; color:var(--agg); border:1px solid var(--agg); }
  .badge.deterministic { background:#3a2350; color:var(--det); border:1px solid var(--det); }
  .badge.mixed { background:#3b3315; color:#f2c94c; border:1px solid #f2c94c; }
  table { border-collapse:collapse; margin-top:8px; font-size:12px; width:100%; }
  th,td { border:1px solid var(--line); padding:4px 8px; text-align:left; }
  th { color:var(--muted); font-weight:600; }
  .note { color:var(--muted); font-size:12px; margin-top:6px; }
  a.dl { display:inline-block; margin-top:8px; background:#0e3b34; color:#3fb6a0;
         border:1px solid #3fb6a0; border-radius:6px; padding:6px 12px; text-decoration:none; }
  .chips { padding:0 18px 8px; display:flex; flex-wrap:wrap; gap:8px; }
  .chip { background:var(--panel); border:1px solid var(--line); color:var(--txt);
          border-radius:16px; padding:6px 12px; font-size:12px; cursor:pointer; }
  .chip:hover { border-color:var(--me); }
  .tip { padding:0 18px 8px; color:var(--muted); font-size:12px; }
  form { display:flex; gap:8px; padding:12px 18px; background:var(--panel);
         border-top:1px solid var(--line); }
  #q { flex:1; background:var(--bubble); color:var(--txt); border:1px solid var(--line);
       border-radius:8px; padding:10px 12px; font-size:14px; }
  button.send { background:var(--me); color:#fff; border:0; border-radius:8px;
                padding:10px 18px; font-size:14px; cursor:pointer; }
</style></head><body>
<header>
  <div><h1>Contoso HR Assistant</h1>
  <div class="sub">Synthetic data · local demo · two-path agent</div></div>
  <label class="persona">Signed in as
    <select id="persona">__PERSONA_OPTS__</select>
  </label>
</header>
<div id="log"></div>
<div class="chips">__CHIPS__</div>
<div class="tip"><b>RLS money-shot:</b> run <i>&ldquo;Export the full active roster for my
  region&rdquo;</i> as EMEA, then switch the persona to APAC and run it again — the row count
  changes because row-level security scopes it server-side, from the signed-in user.</div>
<form id="f"><input id="q" autocomplete="off"
  placeholder="Ask about the Contoso workforce…"><button class="send">Send</button></form>
<script>
const log = document.getElementById('log'), q = document.getElementById('q');
const cols = __DISPLAY_COLS__;
function el(t, c, h) {
  const e = document.createElement(t);
  if (c) e.className = c;
  if (h != null) e.innerHTML = h;
  return e;
}
function esc(s) {
  return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}
function addUser(t) {
  log.appendChild(el('div', 'msg user', esc(t)));
  log.scrollTop = log.scrollHeight;
}
function table(rows) {
  if (!rows || !rows.length) return '';
  const show = rows.slice(0, 25);
  const head = cols.map(c => `<th>${c}</th>`).join('');
  const body = show.map(r =>
    `<tr>${cols.map(c => `<td>${esc(r[c] ?? '')}</td>`).join('')}</tr>`).join('');
  const more = rows.length > 25
    ? `<div class="note">…and ${rows.length - 25} more rows.</div>` : '';
  return `<table><tr>${head}</tr>${body}</table>${more}`;
}
function addBot(d) {
  const m = el('div', 'msg bot');
  m.appendChild(el('div', 'badge ' + d.path, `${d.path} · ${d.tool}`));
  m.appendChild(el('div', null, esc(d.answer)));
  if (d.rows) m.insertAdjacentHTML('beforeend', table(d.rows));
  if (d.download) m.insertAdjacentHTML('beforeend',
    `<a class="dl" href="/download?file=${encodeURIComponent(d.download)}">⬇ Download ${esc(d.download)}</a>`);
  log.appendChild(m);
  log.scrollTop = log.scrollHeight;
}
async function ask(text) {
  if (!text.trim()) return;
  addUser(text); q.value = '';
  const upn = document.getElementById('persona').value;
  try {
    const res = await fetch('/chat', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question: text, upn})
    });
    addBot(await res.json());
  } catch (e) {
    addBot({path: 'deterministic', tool: 'error', answer: 'Request failed: ' + e});
  }
}
document.getElementById('f').addEventListener('submit', e => { e.preventDefault(); ask(q.value); });
document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => ask(c.textContent)));
</script></body></html>
